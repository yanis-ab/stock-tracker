# Planification
schedule:
  time: "09:00"           # Heure du check quotidien (format HH:MM)
  timezone: "Europe/Paris"

# Watchlist : actions a surveiller
watchlist:
  - ticker: "ASML.AS"
    name: "ASML"
    target_price: 750.0
    alert_type: "below"   # 'below' = alerte si cours < cible, 'above' = alerte si cours > cible
    notes: "Attendre correction post-resultats"
  - ticker: "STM.MI"
    name: "STMicroelectronics"
    target_price: 22.0
    alert_type: "below"
    notes: "Rebond de cycle semi-conducteurs"
  - ticker: "AIR.PA"
    name: "Airbus"
    target_price: 155.0
    alert_type: "below"
    notes: ""

